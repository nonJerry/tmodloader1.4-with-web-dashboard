services:
  terraria:
    container_name: 'terraria'
    build: 
      context: ..
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    image: nonjerry/tmodloader1.4:ci
    restart: unless-stopped
    healthcheck:
      test: "nc -z 127.0.0.1 6002 || exit 1"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
      x-podman.on_failure: restart
    ports:
      - '6002:6002'
    expose:
      - 6002
    volumes:
      - server_data:/data
      - ../control/api:/www/cgi-bin/api:Z,ro
    env_file:
      - .env
    entrypoint: [ "/bin/sh", "-c", "./entrypoint.sh & tail -F /tmp/busy.pipe & exec busybox httpd -f -p 6002 -h /www" ]

  web:
    container_name: 'web'
    build:
      dockerfile: control/frontend/Dockerfile
      context: ..
      target: development
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    image: nonjerry/terraria-frontend:ci
    restart: unless-stopped
    healthcheck:
      test: "wget --quiet --tries=1 --spider http://127.0.0.1:5173 || exit 1"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    environment:
      CHOKIDAR_USEPOLLING: true
      CHOKIDAR_INTERVAL: 100
    ports:
      - 5173:5173
    volumes:
      - ../control/frontend:/app/control/frontend:Z,ro
      - /app/control/frontend/node_modules
    env_file:
      - ../control/frontend/.env

  backend:
    container_name: 'backend'
    image: nonjerry/terraria-backend:ci
    build:
      dockerfile: control/backend/Dockerfile
      args:
        - NODE_ENV=development
      context: ..
      target: development
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    ports:
      - '8000:8000'
    env_file:
      - ../control/redis/redis.env
    environment:
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: http://localhost:5173
      CHOKIDAR_USEPOLLING: true
      CHOKIDAR_INTERVAL: 100
    secrets:
      - users
    volumes:
      - ../control/backend/src:/code/control/backend/src:Z,ro
      - /code/node_modules

  redis:
    image: redis:alpine
    restart: always
    healthcheck:
      test: [ "CMD", "/usr/local/bin/healthcheck.sh" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    command: [ "redis-server", "/etc/redis/redis.conf" ]
    env_file:
      - ../control/redis/redis.env
    volumes:
      - ../control/redis/redis.conf:/etc/redis/redis.conf:Z,ro
      - ../control/redis/healthcheck.sh:/usr/local/bin/healthcheck.sh:Z,ro
      - redis_data:/data

secrets:
  users:
    file: ../example.users.json

volumes:
  server_data:
  redis_data:
  node_modules:
