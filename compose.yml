services:
  terraria:
    container_name: 'terraria'
    build: .
    image: terraria:local
    restart: unless-stopped
    healthcheck:
      test: "nc -z 127.0.0.1 6000 || exit 1"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
      x-podman.on_failure: restart
    ports:
      - '127.0.0.1:7778:7777'
    expose:
      - '6000'
    volumes:
      - /srv/terraria:/data:z
      - ./control/api:/www/cgi-bin/api
    env_file:
      - .env
    entrypoint: ["/bin/sh", "-c", "./entrypoint.sh & exec busybox httpd -f -p 6000 -h /www"]

  web:
    container_name: 'web'
    build: ./control/frontend
    image: terraria/web-server:local
    restart: unless-stopped
    healthcheck:
      test: "wget --quiet --tries=1 --spider http://127.0.0.1:8080 || exit 1"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    ports:
      - 6001:8080

  laravel9_database:
    image: mysql:8
    volumes:
      - database_api:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: mysqladmin -u${DB_USERNAME} -p${DB_PASSWORD} ping -h 127.0.0.1
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}

  laravel:
    build: ./control/laravel
    image: laravel9_api:from_scratch
    volumes:
      - ./.env:/var/www/laravel-app/.env
    depends_on:
      laravel9_database:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8000:8000"


volumes:
  database_api: