name: Custom Build of tModLoader Repository
on:
  workflow_dispatch:
    inputs:
      release:
        description: 'The tModLoader Release to download and build.'
        required: true
        type: string
      aslatest:
        description: 'Should this push as latest?'
        required: true
        type: boolean
jobs:
  check-tmodloader-version:
    runs-on: ubuntu-latest
    env:
      REPO_VERSION:
      CURRENT_VERSION:
    outputs:
      SHOULD_UPDATE: ${{ steps.compareVersions.outputs.SHOULD_UPDATE }}
      CURRENT_VERSION: ${{ steps.getCurrentVersion.outputs.CURRENT_VERSION }}
      REPO_VERSION: ${{ steps.getRepoVersion.outputs.REPO_VERSION }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            Dockerfile
      - name: Get Current Version
        id: getCurrentVersion
        run: echo "CURRENT_VERSION=$(grep -oP '(?<=\bTMOD_VERSION=)[^;]+' ./Dockerfile)" >> $GITHUB_OUTPUTS
      - name: Get Repository Version
        id: getRepoVersion
        run: echo "REPO_VERSION=$(curl -sL https://api.github.com/repos/tModLoader/tModLoader/releases | jq -r "map(select(.prerelease==false)) | first | .tag_name")" >> $GITHUB_OUTPUTS
      - name: Compare Versions
        id: compareVersions
        run: echo "SHOULD_UPDATE=${{ env.CURRENT_VERSION != env.REPO_VERSION }}" >> $GITHUB_OUTPUTS

  manual-run:
    runs-on: ubuntu-latest
    needs: check-tmodloader-version
    env:
      SHOULD_UPDATE: ${{ needs.check-tmodloader-version.outputs.SHOULD_UPDATE }}
      REPO_VERSION: ${{needs.check-tmodloader-version.outputs.REPO_VERSION}}
      CURRENT_VERSION: ${{needs.check-tmodloader-version.outputs.CURRENT_VERSION}}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
         sparse-checkout: .
      - name: Print Version to Download
        run: echo ${{ inputs.release }}
      - name: Update Dockerfile Version
        if: ${{ env.SHOULD_UPDATE == 'true' }}
        run: sed -i "s/${{ env.CURRENT_VERSION }}/${{ inputs.release }}/" ./Dockerfile
      - name: Login to Dockerhub
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: docker login -u $DOCKER_USER -p $DOCKER_PASSWORD
      - name: Build Docker Image
        run: "docker build . --file ./Dockerfile --tag ${{ secrets.DOCKER_USER }}/tmodloader1.4:${{ inputs.release }} --tag ${{ secrets.DOCKER_USER }}/tmodloader1.4:latest"
      - name: Push Image to DockerHub as Version
        run: docker push ${{ secrets.DOCKER_USER }}/tmodloader1.4:${{ inputs.release }}
      - name: Push Image to DockerHub as Latest
        if: github.event.inputs.aslatest == 'true'
        run: docker push ${{ secrets.DOCKER_USER }}/tmodloader1.4:latest
