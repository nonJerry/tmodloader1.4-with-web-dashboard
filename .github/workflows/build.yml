name: "Build"

on:
  workflow_call:
    inputs:
      SHOULD_UPDATE:
        required: true
        type: string
        description: "Whether to update the tModLoader version"
      REPO_VERSION:
        required: true
        type: string
        description: "The latest tModLoader version"
      CURRENT_VERSION:
        required: true
        type: string
        description: "The currently used tModLoader version"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
      SHOULD_UPDATE: ${{ inputs.SHOULD_UPDATE }}
      REPO_VERSION: ${{ inputs.REPO_VERSION }}
      CURRENT_VERSION: ${{ inputs.CURRENT_VERSION }}

    strategy:
      matrix:
        image:
          - name: tmodloader1.4
            dockerfile: ./Dockerfile
            context: .
          - name: terraria-frontend
            dockerfile: ./control/frontend/Dockerfile
            context: ./control/frontend
            target: development
          - name: terraria-backend
            dockerfile: ./control/backend/Dockerfile
            context: ./control/backend
            target: development
            args: NODE_ENV=development

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Update Dockerfile Version
        if: ${{ env.SHOULD_UPDATE == 'true' }}
        run: sed -i "s/${{ env.CURRENT_VERSION }}/${{ env.REPO_VERSION }}/" ./Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          tags: nonjerry/${{ matrix.image.name }}:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install deps
        run: pnpm install

      - name: Lint repository
        run: pnpm lint

      - name: Build repository
        run: pnpm build
